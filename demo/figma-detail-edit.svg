<svg width="393" height="852" viewBox="0 0 393 852" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="196" y1="0" x2="196" y2="852" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDECC2"/>
      <stop offset="0.3" stop-color="#F0EAE0"/>
      <stop offset="0.6" stop-color="#F8F5EF"/>
    </linearGradient>
    <linearGradient id="nightGrad" x1="196" y1="130" x2="196" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1535"/>
      <stop offset="0.7" stop-color="#2D1B4E"/>
      <stop offset="1" stop-color="#3A2560"/>
    </linearGradient>
    <clipPath id="phoneClip">
      <rect width="393" height="852" rx="44"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="393" height="852" rx="44" fill="#1A1A2E"/>
  <g clip-path="url(#phoneClip)">
    <!-- Background -->
    <rect width="393" height="852" fill="url(#bgGrad)"/>

    <!-- ═══ STATUS BAR ═══ -->
    <text x="36" y="44" font-family="PingFang SC, SF Pro, sans-serif" font-size="15" font-weight="600" fill="#000">9:41</text>
    <g transform="translate(316, 32)">
      <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#000"/>
      <rect x="4" y="4" width="3" height="8" rx="0.5" fill="#000"/>
      <rect x="8" y="2" width="3" height="10" rx="0.5" fill="#000"/>
      <rect x="12" y="0" width="3" height="12" rx="0.5" fill="#000"/>
    </g>
    <g transform="translate(338, 32)">
      <path d="M8 2.5C10.7 2.5 13 3.8 14.5 6L13 7.5C11.8 5.8 10 4.5 8 4.5C6 4.5 4.2 5.8 3 7.5L1.5 6C3 3.8 5.3 2.5 8 2.5Z" fill="#000"/>
      <circle cx="8" cy="10" r="1.5" fill="#000"/>
    </g>
    <g transform="translate(358, 32)">
      <rect x="0" y="1" width="21" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/>
      <rect x="22" y="4" width="2" height="4" rx="0.5" fill="#000"/>
      <rect x="1.5" y="2.5" width="18" height="7.5" rx="1" fill="#000"/>
    </g>

    <!-- ═══ DARK OVERLAY ═══ -->
    <rect width="393" height="852" fill="#000" opacity="0.75"/>

    <!-- Close button -->
    <g transform="translate(349, 62)">
      <line x1="0" y1="0" x2="14" y2="14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="14" y1="0" x2="0" y2="14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Peeking chat bubble -->
    <rect x="80" y="90" width="290" height="44" rx="20" fill="#F9F9FC" opacity="0.25"/>
    <text x="110" y="118" font-family="PingFang SC, sans-serif" font-size="15" fill="#fff" opacity="0.4">晚安糯糯妈妈，祝你有个好梦！</text>

    <!-- ═══ DETAIL SHEET ═══ -->
    <!-- Sheet background -->
    <rect y="148" width="393" height="704" rx="28" fill="#F8F5EF"/>

    <!-- ═══ NIGHT HEADER ═══ -->
    <path d="M0 176C0 160.536 12.536 148 28 148H365C380.464 148 393 160.536 393 176V240H0V176Z" fill="url(#nightGrad)"/>

    <!-- Stars -->
    <circle cx="45" cy="162" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="120" cy="168" r="1.5" fill="#fff" opacity="0.3"/>
    <circle cx="200" cy="156" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="280" cy="172" r="1" fill="#fff" opacity="0.3"/>
    <circle cx="330" cy="158" r="1.5" fill="#fff" opacity="0.4"/>
    <circle cx="70" cy="188" r="1" fill="#fff" opacity="0.2"/>
    <circle cx="160" cy="185" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="250" cy="195" r="1.5" fill="#fff" opacity="0.3"/>
    <circle cx="350" cy="190" r="1" fill="#fff" opacity="0.5"/>

    <!-- Moon -->
    <g transform="translate(349, 156)">
      <circle cx="14" cy="14" r="12" fill="#FFE4A8"/>
      <circle cx="18" cy="11" r="11" fill="#2D1B4E" opacity="0.85"/>
    </g>

    <!-- Star icon -->
    <rect x="16" y="200" width="41" height="41" rx="10" fill="#3A2560"/>
    <text x="36" y="228" font-family="PingFang SC, sans-serif" font-size="20" text-anchor="middle">🌟</text>

    <!-- Title -->
    <text x="68" y="228" font-family="PingFang SC, sans-serif" font-size="24" fill="#fff">种星星</text>

    <!-- ═══ SECTION: 互动步骤 ═══ -->
    <text x="24" y="272" font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">🎮  <tspan font-weight="500" fill="#282737">互动步骤</tspan></text>

    <text font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">
      <tspan x="24" y="296">星仔会带你们玩一个"种星星"的游戏：</tspan>
    </text>

    <text font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">
      <tspan x="36" y="322">1.  🌹  分享今天的开心事，像种下一朵玫瑰</tspan>
      <tspan x="36" y="344">2.  🌵  说出不开心，把心里的"小刺"拔出来丢掉</tspan>
      <tspan x="36" y="366">3.  🌱  表达明天的期待，让小芽长出惊喜</tspan>
    </text>

    <text font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">
      <tspan x="24" y="394">聊完后，星仔会把你们的对话放进画里，明早</tspan>
      <tspan x="24" y="414">送给你和糯糯。</tspan>
    </text>

    <!-- ═══ SECTION: 推荐原因 ═══ -->
    <text x="24" y="448" font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">💡  <tspan font-weight="500" fill="#282737">推荐原因</tspan></text>

    <text font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">
      <tspan x="24" y="472">这是针对糯糯的情绪表达练习：这个环节能帮</tspan>
      <tspan x="24" y="492">3 岁孩子学会理解情绪，自在地表达"开心"、</tspan>
      <tspan x="24" y="512">安全地吐露"不开心"。</tspan>
    </text>

    <!-- ═══ HOW TO START CARD ═══ -->
    <rect x="24" y="536" width="345" height="220" rx="29" fill="#FFFFFF"/>

    <!-- Card title -->
    <text x="44" y="566" font-family="PingFang SC, sans-serif" font-size="14" font-weight="500" fill="#282737">怎么开始？</text>

    <!-- Steps -->
    <text font-family="PingFang SC, sans-serif" font-size="14" fill="#282737">
      <tspan x="44" y="594">1.  切换到孩子模式</tspan>
      <tspan x="44" y="622">2.  每晚在这个时间段找星仔聊天，它会主</tspan>
      <tspan x="60" y="642">动邀请你们种星星</tspan>
    </text>

    <!-- Time select: Start -->
    <rect x="60" y="658" width="120" height="38" rx="16" fill="rgba(113,104,214,0.06)" stroke="#7168D6" stroke-width="1.5" stroke-opacity="0.2"/>
    <text x="100" y="683" font-family="PingFang SC, sans-serif" font-size="18" fill="#7168D6" text-anchor="middle">20:00</text>
    <path d="M138 677L142 681L146 677" stroke="#7168D6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Separator -->
    <text x="196" y="683" font-family="PingFang SC, sans-serif" font-size="14" fill="#424245" text-anchor="middle">~</text>

    <!-- Time select: End -->
    <rect x="214" y="658" width="120" height="38" rx="16" fill="rgba(113,104,214,0.06)" stroke="#7168D6" stroke-width="1.5" stroke-opacity="0.2"/>
    <text x="254" y="683" font-family="PingFang SC, sans-serif" font-size="18" fill="#7168D6" text-anchor="middle">21:00</text>
    <path d="M292 677L296 681L300 677" stroke="#7168D6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Step 3 -->
    <text x="44" y="726" font-family="PingFang SC, sans-serif" font-size="14" fill="#282737">3.  你也可以随时跟星仔说"玩种星星游戏"</text>

    <!-- ═══ CTA BUTTON ═══ -->
    <rect x="24" y="772" width="345" height="52" rx="26" fill="#7168D6"/>
    <text x="196" y="804" font-family="PingFang SC, sans-serif" font-size="16" fill="#fff" text-anchor="middle">保存修改</text>

    <!-- Skip -->
    <text x="196" y="842" font-family="PingFang SC, sans-serif" font-size="13" fill="#424245" text-anchor="middle">取消</text>

    <!-- Home indicator -->
    <rect x="130" y="846" width="134" height="5" rx="2.5" fill="#000" opacity="0.12"/>
  </g>
</svg>
