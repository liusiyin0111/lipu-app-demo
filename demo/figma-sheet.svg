<svg xmlns="http://www.w3.org/2000/svg" width="393" height="590" viewBox="0 0 393 590" fill="none">
  <defs>
    <linearGradient id="nightBg" x1="196" y1="0" x2="196" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1535"/>
      <stop offset="0.7" stop-color="#2D1B4E"/>
      <stop offset="1" stop-color="#3A2560"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="340" y1="30" x2="360" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8DC"/>
      <stop offset="1" stop-color="#FFE4A8"/>
    </linearGradient>
    <linearGradient id="ctaBg" x1="196" y1="470" x2="196" y2="514" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7168D6"/>
      <stop offset="1" stop-color="#6057C4"/>
    </linearGradient>
    <filter id="moonGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FFE8A8" flood-opacity="0.3"/>
    </filter>
    <filter id="ctaShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7168D6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sheet Background -->
  <rect width="393" height="590" rx="32" fill="#F8F5EF"/>

  <!-- Handle Bar -->
  <rect x="178" y="10" width="36" height="5" rx="2.5" fill="#000" fill-opacity="0.1"/>

  <!-- ═══ NIGHT HEADER ═══ -->
  <g id="NightHeader">
    <rect x="0" y="22" width="393" height="130" fill="url(#nightBg)"/>
    <rect x="0" y="22" width="393" height="40" rx="24" fill="url(#nightBg)"/>

    <!-- Stars -->
    <circle cx="30" cy="45" r="1" fill="#fff" fill-opacity="0.4"/>
    <circle cx="75" cy="65" r="1.5" fill="#fff" fill-opacity="0.25"/>
    <circle cx="120" cy="38" r="1" fill="#fff" fill-opacity="0.5"/>
    <circle cx="175" cy="55" r="1.5" fill="#fff" fill-opacity="0.2"/>
    <circle cx="225" cy="35" r="1" fill="#fff" fill-opacity="0.6"/>
    <circle cx="260" cy="72" r="1" fill="#fff" fill-opacity="0.3"/>
    <circle cx="300" cy="48" r="1.5" fill="#fff" fill-opacity="0.35"/>
    <circle cx="50" cy="95" r="1" fill="#fff" fill-opacity="0.3"/>
    <circle cx="140" cy="108" r="1" fill="#fff" fill-opacity="0.4"/>
    <circle cx="200" cy="96" r="1.5" fill="#fff" fill-opacity="0.2"/>
    <circle cx="330" cy="100" r="1" fill="#fff" fill-opacity="0.4"/>

    <!-- Moon -->
    <g id="Moon" filter="url(#moonGlow)">
      <circle cx="350" cy="52" r="14" fill="url(#moonGrad)"/>
      <circle cx="357" cy="49" r="11" fill="#1A1535" fill-opacity="0.85"/>
    </g>

    <!-- Title row -->
    <text x="24" y="68" font-family="Apple Color Emoji, sans-serif" font-size="32">&#x1F31F;</text>
    <text x="64" y="70" font-family="PingFang SC, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF">&#x79CD;&#x661F;&#x661F;</text>
    <text x="24" y="102" font-family="PingFang SC, -apple-system, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.6">&#x7761;&#x524D; 10 &#x5206;&#x949F;&#xFF0C;&#x548C;&#x5B69;&#x5B50;&#x8F6E;&#x6D41;&#x5206;&#x4EAB;&#x4ECA;&#x5929;&#x7684;&#x6545;&#x4E8B;</text>
  </g>

  <!-- ═══ THREE STEPS ═══ -->
  <g id="ThreeSteps">
    <g id="Step_Rose">
      <rect x="20" y="168" width="113" height="90" rx="16" fill="#FFF5F5" stroke="#000" stroke-opacity="0.04"/>
      <text x="76" y="200" font-family="Apple Color Emoji, sans-serif" font-size="26" text-anchor="middle">&#x1F339;</text>
      <text x="76" y="224" font-family="PingFang SC, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#282737" text-anchor="middle">&#x73AB;&#x7470;</text>
      <text x="76" y="242" font-family="PingFang SC, -apple-system, sans-serif" font-size="11" fill="#424245" text-anchor="middle">&#x4ECA;&#x5929;&#x6700;&#x5F00;&#x5FC3;</text>
    </g>
    <g id="Step_Thorn">
      <rect x="140" y="168" width="113" height="90" rx="16" fill="#FFFBF0" stroke="#000" stroke-opacity="0.04"/>
      <text x="196" y="200" font-family="Apple Color Emoji, sans-serif" font-size="26" text-anchor="middle">&#x1F335;</text>
      <text x="196" y="224" font-family="PingFang SC, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#282737" text-anchor="middle">&#x5C0F;&#x523A;</text>
      <text x="196" y="242" font-family="PingFang SC, -apple-system, sans-serif" font-size="11" fill="#424245" text-anchor="middle">&#x4ECA;&#x5929;&#x4E0D;&#x5F00;&#x5FC3;</text>
    </g>
    <g id="Step_Bud">
      <rect x="260" y="168" width="113" height="90" rx="16" fill="#F0FFF5" stroke="#000" stroke-opacity="0.04"/>
      <text x="316" y="200" font-family="Apple Color Emoji, sans-serif" font-size="26" text-anchor="middle">&#x1F331;</text>
      <text x="316" y="224" font-family="PingFang SC, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#282737" text-anchor="middle">&#x5C0F;&#x82BD;</text>
      <text x="316" y="242" font-family="PingFang SC, -apple-system, sans-serif" font-size="11" fill="#424245" text-anchor="middle">&#x660E;&#x5929;&#x671F;&#x5F85;</text>
    </g>
  </g>

  <!-- ═══ ONE-LINER ═══ -->
  <g id="OneLiner">
    <text x="196" y="286" font-family="PingFang SC, -apple-system, sans-serif" font-size="14" fill="#424245" text-anchor="middle">&#x661F;&#x4ED4;&#x4E3B;&#x6301;&#xFF0C;&#x4F60;&#x4EEC;&#x8D1F;&#x8D23;&#x804A;&#x5929;&#x5C31;&#x597D;</text>
    <text x="196" y="306" font-family="PingFang SC, -apple-system, sans-serif" font-size="14" fill="#424245" text-anchor="middle">&#x804A;&#x5B8C;&#x661F;&#x4ED4;&#x4F1A;&#x753B;&#x4E00;&#x5E45; <tspan font-weight="500" fill="#282737">&#x661F;&#x5149;&#x753B;</tspan> &#x1F3A8; &#x9001;&#x4F60;&#x4EEC;</text>
  </g>

  <!-- ═══ HOW TO START ═══ -->
  <g id="HowToStart">
    <!-- Section label -->
    <text x="20" y="340" font-family="PingFang SC, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#424245">&#x600E;&#x4E48;&#x5F00;&#x59CB;&#xFF1F;</text>

    <!-- Card background -->
    <rect x="20" y="352" width="353" height="148" rx="14" fill="#FFFFFF" stroke="#000" stroke-opacity="0.04"/>

    <!-- ── Method 1: Time window ── -->
    <g id="Method_TimeWindow">
      <!-- Icon -->
      <rect x="34" y="364" width="36" height="36" rx="10" fill="#7168D6" fill-opacity="0.08"/>
      <text x="41" y="389" font-family="Apple Color Emoji, sans-serif" font-size="18">&#x1F319;</text>

      <!-- Text -->
      <text x="82" y="380" font-family="PingFang SC, -apple-system, sans-serif" font-size="14" fill="#282737">&#x6BCF;&#x665A;&#x8FD9;&#x4E2A;&#x65F6;&#x6BB5;&#x804A;&#x5929;&#x65F6;</text>
      <text x="82" y="397" font-family="PingFang SC, -apple-system, sans-serif" font-size="12" fill="#424245">&#x661F;&#x4ED4;&#x4F1A;&#x4E3B;&#x52A8;&#x9080;&#x8BF7;&#x4F60;&#x4EEC;&#x79CD;&#x661F;&#x661F;</text>
    </g>

    <!-- Time range inputs -->
    <g id="TimeRange">
      <!-- Start time box -->
      <rect x="100" y="410" width="100" height="36" rx="12" fill="#7168D6" fill-opacity="0.06" stroke="#7168D6" stroke-opacity="0.2" stroke-width="1.5"/>
      <text x="150" y="434" font-family="PingFang SC, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#7168D6" text-anchor="middle">20:00</text>

      <!-- Separator -->
      <text x="210" y="434" font-family="PingFang SC, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#424245" text-anchor="middle">~</text>

      <!-- End time box -->
      <rect x="220" y="410" width="100" height="36" rx="12" fill="#7168D6" fill-opacity="0.06" stroke="#7168D6" stroke-opacity="0.2" stroke-width="1.5"/>
      <text x="270" y="434" font-family="PingFang SC, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#7168D6" text-anchor="middle">21:00</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="456" x2="373" y2="456" stroke="#000" stroke-opacity="0.04"/>

    <!-- ── Method 2: Anytime ── -->
    <g id="Method_Anytime">
      <!-- Icon -->
      <rect x="34" y="466" width="36" height="36" rx="10" fill="#92E27C" fill-opacity="0.12"/>
      <text x="41" y="491" font-family="Apple Color Emoji, sans-serif" font-size="18">&#x1F4AC;</text>

      <!-- Text -->
      <text x="82" y="482" font-family="PingFang SC, -apple-system, sans-serif" font-size="14" fill="#282737">&#x968F;&#x65F6;&#x8DDF;&#x661F;&#x4ED4;&#x8BF4; <tspan font-weight="600">&#x201C;&#x79CD;&#x661F;&#x661F;&#x201D;</tspan></text>
      <text x="82" y="497" font-family="PingFang SC, -apple-system, sans-serif" font-size="12" fill="#424245">&#x4EFB;&#x4F55;&#x65F6;&#x5019;&#x60F3;&#x73A9;&#x90FD;&#x53EF;&#x4EE5;</text>
    </g>
  </g>

  <!-- ═══ CTA ═══ -->
  <g id="CTA">
    <rect x="20" y="518" width="353" height="50" rx="25" fill="url(#ctaBg)" filter="url(#ctaShadow)"/>
    <text x="196" y="548" font-family="PingFang SC, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">&#x1F31F; &#x4ECA;&#x665A;&#x8BD5;&#x8BD5;</text>
  </g>

  <!-- Skip -->
  <text x="196" y="586" font-family="PingFang SC, -apple-system, sans-serif" font-size="13" fill="#424245" text-anchor="middle">&#x4E0B;&#x6B21;&#x518D;&#x8BF4;</text>
</svg>
