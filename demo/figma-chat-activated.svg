<svg width="393" height="852" viewBox="0 0 393 852" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="196" y1="0" x2="196" y2="852" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDECC2"/>
      <stop offset="0.3" stop-color="#F0EAE0"/>
      <stop offset="0.6" stop-color="#F8F5EF"/>
    </linearGradient>
    <linearGradient id="cardActivated" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3F1FF"/>
      <stop offset="1" stop-color="#EEEDFC"/>
    </linearGradient>
    <clipPath id="phoneClip">
      <rect width="393" height="852" rx="44"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="393" height="852" rx="44" fill="#1A1A2E"/>
  <g clip-path="url(#phoneClip)">
    <!-- Background -->
    <rect width="393" height="852" fill="url(#bgGrad)"/>

    <!-- ═══ STATUS BAR ═══ -->
    <text x="36" y="44" font-family="PingFang SC, SF Pro, sans-serif" font-size="15" font-weight="600" fill="#000">9:41</text>
    <!-- Signal -->
    <g transform="translate(316, 32)">
      <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#000"/>
      <rect x="4" y="4" width="3" height="8" rx="0.5" fill="#000"/>
      <rect x="8" y="2" width="3" height="10" rx="0.5" fill="#000"/>
      <rect x="12" y="0" width="3" height="12" rx="0.5" fill="#000"/>
    </g>
    <!-- WiFi -->
    <g transform="translate(338, 32)">
      <path d="M8 2.5C10.7 2.5 13 3.8 14.5 6L13 7.5C11.8 5.8 10 4.5 8 4.5C6 4.5 4.2 5.8 3 7.5L1.5 6C3 3.8 5.3 2.5 8 2.5Z" fill="#000"/>
      <circle cx="8" cy="10" r="1.5" fill="#000"/>
    </g>
    <!-- Battery -->
    <g transform="translate(358, 32)">
      <rect x="0" y="1" width="21" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/>
      <rect x="22" y="4" width="2" height="4" rx="0.5" fill="#000"/>
      <rect x="1.5" y="2.5" width="18" height="7.5" rx="1" fill="#000"/>
    </g>

    <!-- ═══ CLOSE BUTTON ═══ -->
    <g transform="translate(349, 62)">
      <line x1="0" y1="0" x2="14" y2="14" stroke="#282737" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="0" x2="0" y2="14" stroke="#282737" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- ═══ CHAT BUBBLES ═══ -->

    <!-- Bubble 1: 昨天的消息 -->
    <rect x="80" y="104" width="270" height="48" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text x="96" y="134" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">晚安糯糯妈妈，祝你有个好梦！</text>

    <!-- 今天 label -->
    <text x="196" y="182" font-family="PingFang SC, sans-serif" font-size="12" fill="rgba(40,39,55,0.3)" text-anchor="middle">今天</text>

    <!-- Bubble 2: 晚上好 -->
    <rect x="80" y="196" width="218" height="48" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text x="96" y="226" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">糯糯妈妈，晚上好！</text>

    <!-- Bubble 3: 推荐 -->
    <rect x="80" y="256" width="260" height="76" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text x="96" y="286" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">我想给你推荐一个亲子互动</text>
    <text x="96" y="312" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">活动，今晚就可以试试！</text>

    <!-- ═══ ACTIVATED CARD ═══ -->
    <rect x="80" y="348" width="290" height="120" rx="20" fill="url(#cardActivated)" stroke="rgba(113,104,214,0.12)" stroke-width="1"/>

    <!-- Card icon (circle placeholder) -->
    <circle cx="108" cy="385" r="22" fill="#7168D6"/>
    <text x="108" y="391" font-family="PingFang SC, sans-serif" font-size="14" fill="#fff" text-anchor="middle">🌟</text>

    <!-- Card title + subtitle -->
    <text x="140" y="380" font-family="PingFang SC, sans-serif" font-size="14" font-weight="500" fill="#7168D6">种星星</text>
    <text x="140" y="400" font-family="PingFang SC, sans-serif" font-size="14" fill="#424245">每晚 20:00 ~ 21:00 · 已开启</text>

    <!-- Status badge row -->
    <!-- Green badge -->
    <rect x="92" y="420" width="60" height="24" rx="12" fill="rgba(82,201,122,0.12)"/>
    <circle cx="105" cy="432" r="7" fill="none" stroke="#2EA44F" stroke-width="1.5"/>
    <path d="M102 432.5L104 434.5L108 430" stroke="#2EA44F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="116" y="437" font-family="PingFang SC, sans-serif" font-size="12" font-weight="500" fill="#2EA44F">已开启</text>

    <!-- Time label -->
    <text x="162" y="437" font-family="PingFang SC, sans-serif" font-size="12" fill="#7168D6">每晚 20:00 ~ 21:00</text>

    <!-- Edit button -->
    <rect x="330" y="422" width="28" height="24" rx="8" fill="rgba(113,104,214,0.08)"/>
    <g transform="translate(337, 426)">
      <path d="M11.5 0.5L13.5 2.5L5.5 10.5H3.5V8.5L11.5 0.5Z" stroke="#7168D6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M10 2L12 4" stroke="#7168D6" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </g>

    <!-- ═══ CONFIRMATION BUBBLE ═══ -->
    <rect x="80" y="484" width="290" height="120" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text x="96" y="514" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">好！每晚 20:00 ~ 21:00 来找</text>
    <text x="96" y="540" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">我聊天的话，我会邀请你们</text>
    <text x="96" y="566" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">种星星 🌟</text>
    <text x="96" y="590" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">当然其他时间想玩也可以随</text>
    <text x="96" y="590" font-family="PingFang SC, sans-serif" font-size="16" fill="#282737" opacity="0">时跟我说～</text>

    <!-- Multi-line fix for confirmation -->
    <rect x="80" y="484" width="290" height="140" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text font-family="PingFang SC, sans-serif" font-size="16" fill="#282737">
      <tspan x="96" dy="0" y="514">好！每晚 20:00 ~ 21:00 来</tspan>
      <tspan x="96" dy="26">找我聊天的话，我会邀请你</tspan>
      <tspan x="96" dy="26">们种星星 🌟</tspan>
      <tspan x="96" dy="26">当然其他时间想玩也可以随</tspan>
      <tspan x="96" dy="26">时跟我说～</tspan>
    </text>

    <!-- ═══ INPUT BAR ═══ -->
    <rect x="16" y="796" width="325" height="40" rx="20" fill="#F3F0E9"/>
    <text x="40" y="822" font-family="PingFang SC, sans-serif" font-size="20" fill="#7168D6">＋</text>
    <text x="68" y="822" font-family="PingFang SC, sans-serif" font-size="15" fill="rgba(53,46,38,0.2)">告诉我任何事情...</text>

    <!-- ═══ HOME INDICATOR ═══ -->
    <rect x="130" y="840" width="134" height="5" rx="2.5" fill="#000" opacity="0.12"/>
  </g>
</svg>
