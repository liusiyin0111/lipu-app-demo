    <text x="96" y="252" font-family="PingFang SC, sans-serif" font-size="16" font-weight="500" fill="#282737">睡前故事</text>
    <text x="96" y="272" font-family="PingFang SC, sans-serif" font-size="13" fill="#424245">每天讲一个故事，培养想象力</text>
    <circle cx="354" cy="264" r="4" fill="#52C97A"/>
    <rect x="96" y="286" width="132" height="22" rx="11" fill="#EFEEFC"/>
    <text x="104" y="301" font-family="PingFang SC, sans-serif" font-size="11" fill="#7168D6">⏰ 每晚 19:30 ~ 20:00</text>
