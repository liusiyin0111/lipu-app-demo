<svg xmlns="http://www.w3.org/2000/svg" width="393" height="852" viewBox="0 0 393 852" fill="none">
  <defs>
    <linearGradient id="chatBg" x1="196" y1="0" x2="196" y2="852" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8E0D6"/>
      <stop offset="0.3" stop-color="#F0EAE0"/>
      <stop offset="0.6" stop-color="#F8F5EF"/>
    </linearGradient>
    <filter id="cardShadow" x="-4" y="-2" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0A0D12" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-2" y="-1" width="104%" height="108%">
      <feDropShadow dx="0" dy="1.27" stdDeviation="3.82" flood-color="#4D3532" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="393" height="852" rx="44" fill="url(#chatBg)"/>

  <!-- Status Bar -->
  <g id="StatusBar">
    <text x="36" y="36" font-family="PingFang SC, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#000">20:15</text>
    <!-- Signal -->
    <rect x="320" y="25" width="3" height="5" rx="0.5" fill="#000"/>
    <rect x="324.5" y="22" width="3" height="8" rx="0.5" fill="#000"/>
    <rect x="329" y="19.5" width="3" height="10.5" rx="0.5" fill="#000"/>
    <rect x="333.5" y="17" width="3" height="13" rx="0.5" fill="#000"/>
    <!-- WiFi -->
    <circle cx="348" cy="30" r="1.5" fill="#000"/>
    <path d="M348 22.5C350.2 22.5 352 23.5 353.5 25.5L352.2 27C351 25.5 349.6 24.5 348 24.5C346.4 24.5 345 25.5 343.8 27L342.5 25.5C344 23.5 345.8 22.5 348 22.5Z" fill="#000"/>
    <!-- Battery -->
    <rect x="356" y="21" width="18" height="10" rx="2" stroke="#000" stroke-width="1" fill="none"/>
    <rect x="374.5" y="24" width="1.5" height="4" rx="0.5" fill="#000"/>
    <rect x="357.2" y="22.2" width="15.5" height="7.5" rx="1" fill="#000"/>
  </g>

  <!-- Top Bar -->
  <g id="TopBar">
    <!-- Back Button -->
    <rect x="16" y="62" width="36" height="36" rx="18" fill="#F9F9FC" filter="url(#softShadow)"/>
    <text x="29" y="85" font-family="PingFang SC" font-size="20" fill="#282737">‹</text>
    <!-- Title -->
    <text x="196" y="85" font-family="PingFang SC, -apple-system, sans-serif" font-size="16" fill="#282737" text-anchor="middle">星仔</text>
  </g>

  <!-- Date Label -->
  <g id="DateLabel">
    <text x="196" y="130" font-family="PingFang SC, -apple-system, sans-serif" font-size="12" fill="#282737" fill-opacity="0.3" text-anchor="middle">今天</text>
  </g>

  <!-- Bubble 1: AI Greeting -->
  <g id="Bubble_AI_1">
    <rect x="80" y="148" width="230" height="46" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text x="96" y="177" font-family="PingFang SC, -apple-system, sans-serif" font-size="16" fill="#282737">糯糯妈妈，晚上好呀 😊</text>
  </g>

  <!-- Bubble 2: AI Recommendation Intro -->
  <g id="Bubble_AI_2">
    <rect x="80" y="206" width="280" height="68" rx="20" fill="#F9F9FC" stroke="#FFFFFF" stroke-width="1"/>
    <text x="96" y="235" font-family="PingFang SC, -apple-system, sans-serif" font-size="16" fill="#282737">对了，我想给你推荐一件事——</text>
    <text x="96" y="259" font-family="PingFang SC, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#282737">今晚就可以试！</text>
  </g>

  <!-- Recommend Card -->
  <g id="RecommendCard" filter="url(#cardShadow)">
    <rect x="80" y="290" width="290" height="200" rx="20" fill="#FFFFFF"/>
    <!-- Left-top no round (card radius: 0 20 20 20) -->
    <rect x="80" y="290" width="20" height="20" fill="#FFFFFF"/>

    <!-- Card Header -->
    <g id="CardHeader">
      <!-- Icon -->
      <rect x="96" y="306" width="44" height="44" rx="14" fill="#1A1535"/>
      <text x="107" y="336" font-family="Apple Color Emoji, sans-serif" font-size="22">🌟</text>
      <!-- Star twinkle dot -->
      <circle cx="130" cy="314" r="1.5" fill="#FFFFFF" fill-opacity="0.6"/>
      <!-- Name -->
      <text x="150" y="325" font-family="PingFang SC, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#282737">种星星</text>
      <text x="150" y="345" font-family="PingFang SC, -apple-system, sans-serif" font-size="13" fill="#424245">每晚 10 分钟的睡前亲子仪式</text>
    </g>

    <!-- Tags -->
    <g id="CardTags">
      <rect x="96" y="362" width="64" height="24" rx="12" fill="#7168D6" fill-opacity="0.08"/>
      <text x="110" y="379" font-family="PingFang SC, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#7168D6">睡前仪式</text>

      <rect x="168" y="362" width="64" height="24" rx="12" fill="#7168D6" fill-opacity="0.08"/>
      <text x="182" y="379" font-family="PingFang SC, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#7168D6">亲子互动</text>

      <rect x="240" y="362" width="72" height="24" rx="12" fill="#7168D6" fill-opacity="0.08"/>
      <text x="252" y="379" font-family="PingFang SC, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#7168D6">⏱ 10分钟</text>
    </g>

    <!-- Divider -->
    <line x1="80" y1="398" x2="370" y2="398" stroke="#000000" stroke-opacity="0.04"/>

    <!-- Buttons -->
    <g id="CardButtons">
      <!-- Primary Button -->
      <rect x="96" y="412" width="150" height="44" rx="22" fill="#7168D6"/>
      <text x="120" y="439" font-family="PingFang SC, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#FFFFFF">好呀，详细看看</text>

      <!-- Ghost Button -->
      <rect x="256" y="412" width="98" height="44" rx="22" fill="none" stroke="#7168D6" stroke-width="1.5"/>
      <text x="275" y="439" font-family="PingFang SC, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#7168D6">这是什么？</text>
    </g>
  </g>

  <!-- Action Bar -->
  <g id="ActionBar">
    <!-- Input -->
    <rect x="16" y="778" width="325" height="42" rx="20" fill="#F3F0E9"/>
    <text x="40" y="804" font-family="PingFang SC, -apple-system, sans-serif" font-size="20" fill="#7168D6">＋</text>
    <text x="64" y="803" font-family="PingFang SC, -apple-system, sans-serif" font-size="15" fill="#352E26" fill-opacity="0.2">告诉我任何事情...</text>

    <!-- Send Button -->
    <circle cx="359" cy="799" r="18" fill="#D9D7F4"/>
    <text x="353" y="805" font-family="PingFang SC" font-size="16" fill="#FFFFFF">↑</text>
  </g>

  <!-- Footer -->
  <text x="196" y="838" font-family="PingFang SC, -apple-system, sans-serif" font-size="10" fill="#352E26" fill-opacity="0.2" text-anchor="middle">内容由 AI 生成</text>

  <!-- Home Indicator -->
  <rect x="130" y="846" width="134" height="5" rx="2.5" fill="#000000" fill-opacity="0.12"/>
</svg>
