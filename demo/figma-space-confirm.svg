    <rect x="16" y="348" width="361" height="120" rx="20" fill="#fff" opacity="0.4"/>
    <rect x="32" y="364" width="48" height="48" rx="14" fill="#2D5A27" opacity="0.4"/>
    <circle cx="354" cy="396" r="4" fill="#52C97A" opacity="0.4"/>

